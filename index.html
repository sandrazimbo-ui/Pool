<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Pool-Wochenroutine</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#0a3355"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Pool 🏊"/>
<link rel="apple-touch-icon" href="icon-192.png"/>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #0c1a2e 0%, #0a3355 50%, #0e5f8a 100%);
  font-family: Georgia, 'Times New Roman', serif;
  color: #e0f2fe;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}
.bg-fx {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 70% 40% at 15% 80%, rgba(14,120,190,.2) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 85% 15%, rgba(6,182,212,.14) 0%, transparent 55%);
}
svg.waves { position: fixed; bottom: 0; left: 0; right: 0; z-index: 0; opacity: .05; pointer-events: none; }
.wrap { position: relative; z-index: 1; max-width: 540px; margin: 0 auto; padding: 1.75rem 1.1rem 5rem; }

.header { text-align: center; margin-bottom: 1.75rem; }
.header .icon { font-size: 2.8rem; }
.header h1 { font-size: 1.75rem; font-weight: normal; color: #bae6fd; letter-spacing: .05em; margin: .2rem 0 .25rem; text-shadow: 0 2px 20px rgba(56,189,248,.4); }
.header .sub { font-size: .82rem; color: #7dd3fc; font-style: italic; letter-spacing: .07em; }

.datebadge {
  display: flex; align-items: center; justify-content: center; gap: .75rem;
  background: rgba(255,255,255,.05); border: 1px solid rgba(125,211,252,.18);
  border-radius: 14px; padding: .65rem 1rem; margin-bottom: 1.25rem;
  font-size: .82rem; color: #93c5fd; flex-wrap: wrap;
}
.datebadge strong { color: #bae6fd; font-weight: normal; }
.week-tag {
  background: rgba(56,189,248,.15); border: 1px solid rgba(56,189,248,.3);
  border-radius: 8px; padding: .12rem .55rem; font-size: .72rem; color: #38bdf8; letter-spacing: .06em;
}

.inputs-card {
  background: rgba(255,255,255,.05); backdrop-filter: blur(18px);
  border: 1px solid rgba(125,211,252,.18); border-radius: 18px;
  padding: 1.4rem; margin-bottom: 1rem;
}
.inputs-title { font-size: .7rem; letter-spacing: .14em; text-transform: uppercase; color: #7dd3fc; margin-bottom: 1rem; }
.inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .85rem; }
.input-group label { display: flex; align-items: center; gap: .3rem; font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; color: #7dd3fc; margin-bottom: .4rem; }
.num-input {
  width: 100%; padding: .6rem .8rem;
  background: rgba(255,255,255,.07); border: 1px solid rgba(125,211,252,.22);
  border-radius: 11px; color: #e0f2fe; font-size: 1rem; outline: none; font-family: inherit;
  transition: border-color .2s;
}
.num-input:focus { border-color: rgba(56,189,248,.65); }
.input-hint { font-size: .66rem; color: #38bdf8; margin-top: .28rem; opacity: .75; }

.alert {
  border-radius: 12px; padding: .75rem 1rem; margin-bottom: .7rem;
  font-size: .82rem; line-height: 1.5; display: flex; align-items: flex-start; gap: .6rem;
  animation: fadeSlide .35s ease both;
}
.alert-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: .05rem; }
.alert-warn { background: rgba(239,68,68,.13); border: 1px solid rgba(239,68,68,.35); color: #fca5a5; }
.alert-info { background: rgba(234,179,8,.1); border: 1px solid rgba(234,179,8,.3); color: #fde68a; }
.alert-ok   { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.25); color: #86efac; }

.section-title { font-size: .7rem; letter-spacing: .14em; text-transform: uppercase; color: #7dd3fc; margin: 1.2rem 0 .65rem; }

.task {
  background: rgba(255,255,255,.05); backdrop-filter: blur(12px);
  border: 1px solid rgba(125,211,252,.14); border-radius: 14px;
  padding: .95rem 1.1rem; margin-bottom: .6rem;
  transition: all .2s; cursor: pointer;
  animation: fadeSlide .4s ease both;
}
.task:hover { background: rgba(255,255,255,.08); }
.task.done { background: rgba(34,197,94,.08); border-color: rgba(34,197,94,.25); opacity: .75; }
.task.skipped { background: rgba(100,116,139,.07); border-color: rgba(100,116,139,.2); opacity: .55; }
.task-top { display: flex; align-items: flex-start; gap: .75rem; }
.task-check {
  width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0; margin-top: .1rem;
  border: 2px solid rgba(125,211,252,.35); background: rgba(255,255,255,.04);
  display: flex; align-items: center; justify-content: center; font-size: .9rem;
  transition: all .2s;
}
.task.done .task-check { background: rgba(34,197,94,.3); border-color: #22c55e; }
.task-body { flex: 1; }
.task-name { font-size: .9rem; color: #bae6fd; font-weight: bold; margin-bottom: .2rem; display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; }
.task-name .step { font-size: .7rem; color: #38bdf8; background: rgba(56,189,248,.12); border: 1px solid rgba(56,189,248,.25); border-radius: 5px; padding: .05rem .35rem; flex-shrink:0; }
.task-desc { font-size: .78rem; color: #93c5fd; line-height: 1.5; }
.task-dose {
  display: inline-block; margin-top: .4rem;
  background: rgba(56,189,248,.12); border: 1px solid rgba(56,189,248,.25);
  border-radius: 8px; padding: .15rem .6rem; font-size: .78rem; color: #7dd3fc;
}
.task-dose.warn { background: rgba(234,179,8,.12); border-color: rgba(234,179,8,.3); color: #fde68a; }
.task-dose.danger { background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.3); color: #fca5a5; }
.task-dose.muted { background: rgba(100,116,139,.1); border-color: rgba(100,116,139,.2); color: #94a3b8; font-style: italic; }
.task-dose.ok { background: rgba(34,197,94,.1); border-color: rgba(34,197,94,.25); color: #86efac; }
.skip-btn {
  margin-top: .5rem; font-size: .7rem; color: #475569; background: none; border: none;
  cursor: pointer; font-family: inherit; text-decoration: underline;
}

.progress-bar-wrap {
  background: rgba(255,255,255,.06); border: 1px solid rgba(125,211,252,.15);
  border-radius: 14px; padding: .85rem 1.1rem; margin-bottom: 1rem;
  display: flex; align-items: center; gap: .85rem;
}
.progress-track { flex: 1; height: 6px; background: rgba(255,255,255,.08); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #0891b2, #22c55e); transition: width .4s ease; }
.progress-txt { font-size: .78rem; color: #7dd3fc; white-space: nowrap; }

.congrats {
  text-align: center; padding: 1.5rem 1rem;
  background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.25);
  border-radius: 16px; margin-top: 1rem; animation: fadeSlide .4s ease;
}
.congrats .big { font-size: 2.5rem; margin-bottom: .5rem; }
.congrats h3 { color: #86efac; font-weight: normal; font-size: 1.1rem; margin-bottom: .35rem; }
.congrats p { font-size: .78rem; color: #4ade80; opacity: .8; }

.btn-reset-week {
  width: 100%; margin-top: 1.1rem; padding: .75rem;
  background: rgba(255,255,255,.04); border: 1px solid rgba(125,211,252,.18);
  border-radius: 12px; color: #7dd3fc; font-size: .85rem; cursor: pointer;
  font-family: inherit; transition: all .15s;
}
.btn-reset-week:hover { background: rgba(255,255,255,.08); }

@keyframes fadeSlide { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
input[type=number]::-webkit-inner-spin-button { opacity: .3; }
</style>
</head>
<body>

<div class="bg-fx"></div>
<svg class="waves" viewBox="0 0 1440 180" preserveAspectRatio="none" height="180">
  <path d="M0,90 C360,150 720,30 1080,90 C1260,120 1380,70 1440,90 L1440,200 L0,200Z" fill="#7dd3fc"/>
  <path d="M0,125 C400,70 800,165 1200,105 C1320,82 1400,132 1440,125 L1440,200 L0,200Z" fill="#38bdf8"/>
</svg>

<div class="wrap">
  <div class="header">
    <div class="icon">🏊</div>
    <h1>Pool-Wochenroutine</h1>
    <p class="sub">11.5 m³ · 5 Minuten · einmal pro Woche</p>
  </div>

  <div class="datebadge">
    <strong id="todayDate">—</strong>
    <span class="week-tag" id="weekTag">KW —</span>
    <span id="lastDoneNote" style="font-size:.72rem;opacity:.6"></span>
  </div>

  <div class="inputs-card">
    <div class="inputs-title">📊 Aktuelle Messwerte eingeben</div>
    <div class="inputs-grid">
      <div class="input-group">
        <label>⚗️ pH-Wert</label>
        <input class="num-input" id="inPh" type="number" step="0.1" min="4" max="10" placeholder="z.B. 7.3" oninput="refresh()"/>
        <div class="input-hint">Ideal: 7.0–7.4</div>
      </div>
      <div class="input-group">
        <label>🧪 Chlor (mg/L)</label>
        <input class="num-input" id="inCl" type="number" step="0.1" min="0" max="20" placeholder="z.B. 1.2" oninput="refresh()"/>
        <div class="input-hint">Ideal: 1.0–1.5</div>
      </div>
      <div class="input-group">
        <label>🌡️ Wassertemp. (°C)</label>
        <input class="num-input" id="inWater" type="number" step="0.5" min="0" max="40" placeholder="z.B. 22" oninput="refresh()"/>
        <div class="input-hint">Algizid ab 20 °C</div>
      </div>
      <div class="input-group">
        <label>☀️ Außentemp. (°C)</label>
        <input class="num-input" id="inAir" type="number" step="0.5" min="0" max="50" placeholder="z.B. 28" oninput="refresh()"/>
        <div class="input-hint">Schockchlor ab 30 °C</div>
      </div>
    </div>
  </div>

  <div id="alertBox"></div>

  <div class="progress-bar-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <span class="progress-txt" id="progressTxt">0 / 0 erledigt</span>
  </div>

  <div class="section-title">Wöchentliche Checkliste</div>
  <div id="taskList"></div>

  <div id="congratsBox" style="display:none" class="congrats">
    <div class="big">🎉</div>
    <h3>Wochenroutine abgeschlossen!</h3>
    <p id="doneTime">—</p>
  </div>

  <button class="btn-reset-week" onclick="resetWeek()">↺ Neue Woche starten</button>

  <div id="resetConfirm" style="display:none; margin-top:.75rem; background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); border-radius:12px; padding:.85rem 1rem; align-items:center; justify-content:space-between; gap:.75rem; flex-wrap:wrap;">
    <span style="font-size:.82rem; color:#fca5a5;">Alle Eingaben und Häkchen löschen?</span>
    <div style="display:flex; gap:.5rem;">
      <button onclick="doReset()" style="padding:.35rem .9rem; background:rgba(239,68,68,.25); border:1px solid rgba(239,68,68,.5); border-radius:8px; color:#fca5a5; font-size:.82rem; cursor:pointer; font-family:inherit;">Ja, löschen</button>
      <button onclick="document.getElementById('resetConfirm').style.display='none'" style="padding:.35rem .9rem; background:rgba(255,255,255,.05); border:1px solid rgba(125,211,252,.2); border-radius:8px; color:#7dd3fc; font-size:.82rem; cursor:pointer; font-family:inherit;">Abbrechen</button>
    </div>
  </div>
</div>

<script>
const VOL = 11.5;
const STORAGE_KEY = 'poolRoutine_v3';
let state = load();

function load() {
  try { const s = JSON.parse(localStorage.getItem(STORAGE_KEY)); if (s) return s; } catch(e) {}
  return { tasks: {}, inputs: {}, completedAt: null };
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function getInputs() {
  return {
    ph:    parseFloat(document.getElementById('inPh').value)    || null,
    cl:    parseFloat(document.getElementById('inCl').value)    || null,
    water: parseFloat(document.getElementById('inWater').value) || null,
    air:   parseFloat(document.getElementById('inAir').value)   || null,
  };
}

function buildTasks(inp) {
  const tasks = [];

  // 1. Filter — immer zuerst
  tasks.push({ id:'filter', step:'1', icon:'🔧', name:'Filter reinigen', desc:'Filterkartusche oder Sandfilter spülen. Immer zuerst – viele Probleme entstehen nur durch schmutzigen Filter!', dose:'1× wöchentlich', doseType:'info', skippable:false });

  // 2. Messen
  tasks.push({ id:'measure', step:'2', icon:'📏', name:'Wasser messen', desc:'pH und Chlor mit Teststreifen oder Testgerät prüfen.', dose:'pH 7.0–7.4 · Chlor 1–1.5 mg/L', doseType:'info', skippable:false });

  // 3. pH
  if (inp.ph === null) {
    tasks.push({ id:'ph', step:'3', icon:'⚗️', name:'pH korrigieren', desc:'pH-Wert eingeben um Dosierung zu berechnen.', dose:'pH-Wert oben eingeben', doseType:'muted', skippable:true });
  } else if (inp.ph > 7.4) {
    const g = Math.round(((inp.ph - 7.2) / 0.2) * 100 * (VOL / 10));
    tasks.push({ id:'ph', step:'3', icon:'▼', name:'pH-Minus zugeben', desc:`pH zu hoch (${inp.ph}). Granulat im Eimer auflösen, langsam ins Wasser geben, Filter 30 Min laufen lassen. Danach erneut messen – erst wenn pH stimmt weiter zu Schritt 4!`, dose:`${g} g pH-Minus`, doseType:'warn', skippable:false });
  } else if (inp.ph < 7.0) {
    const g = Math.round(((7.2 - inp.ph) / 0.2) * 130 * (VOL / 10));
    tasks.push({ id:'ph', step:'3', icon:'▲', name:'pH-Plus zugeben', desc:`pH zu niedrig (${inp.ph}). Im Wasser auflösen, verteilt zugeben, Filter 30 Min laufen lassen. Danach erneut messen – erst wenn pH stimmt weiter zu Schritt 4!`, dose:`${g} g pH-Plus`, doseType:'warn', skippable:false });
  } else {
    tasks.push({ id:'ph', step:'3', icon:'✓', name:'pH-Wert i.O.', desc:`pH ${inp.ph} – kein Eingriff nötig. Weiter mit Schritt 4.`, dose:'Keine Korrektur nötig', doseType:'ok', skippable:false });
  }

  // 4. Chlor
  if (inp.cl === null) {
    tasks.push({ id:'cl', step:'4', icon:'🧪', name:'Chlor kontrollieren', desc:'⚠️ Nur ausführen wenn pH im Zielbereich (7.0–7.4)! Chlor-Wert eingeben um Dosierung zu berechnen.', dose:'Chlor-Wert oben eingeben', doseType:'muted', skippable:true });
  } else if (inp.cl < 1.0) {
    const tabs = VOL <= 12 ? 1 : Math.ceil(VOL / 12);
    const g = Math.round((1.2 - inp.cl) * 10 * (VOL / 10));
    tasks.push({ id:'cl', step:'4', icon:'◈', name:'Chlortablette einlegen', desc:`⚠️ Erst ausführen wenn pH korrekt eingestellt und nachgemessen! Chlor zu niedrig (${inp.cl} mg/L). Tablette in Dosierschwimmer – niemals direkt auf Folie legen.`, dose:`${tabs} × 200g Tablette oder ${g} g Granulat`, doseType:'warn', skippable:false });
  } else if (inp.cl > 3.0) {
    tasks.push({ id:'cl', step:'4', icon:'⏸', name:'Chlor zu hoch – warten', desc:`Chlor ${inp.cl} mg/L. Keine Chemie zugeben, Filter laufen lassen, Sonne hilft. Erst bei <2.5 wieder schwimmen.`, dose:'Nichts zugeben', doseType:'muted', skippable:false });
  } else {
    tasks.push({ id:'cl', step:'4', icon:'✓', name:'Chlor i.O.', desc:`Chlor ${inp.cl} mg/L – kein Eingriff nötig.`, dose:'Tablette prüfen / nachfüllen wenn leer', doseType:'info', skippable:false });
  }

  // 5. Schockchlor ab 30°C Aussentemperatur — Marina SOS: ½ Kappe = 150g / 10m³
  if (inp.air !== null && inp.air >= 30) {
    const shockG = Math.round(150 * (VOL / 10));
    const caps = (VOL / 10 * 0.5).toFixed(1);
    tasks.push({ id:'shock', step:'5', icon:'⚡', name:'Schockchlorung (Hitze!)', desc:`Außentemperatur ${inp.air} °C – Chlor wird schnell abgebaut. ⚠️ Erst nach korrektem pH zugeben! Marina SOS Chlor-Schock abends direkt ins Wasser, Filter mind. 8h laufen lassen.`, dose:`${caps} Dosierkappe (≈ ${shockG} g) Marina SOS`, doseType:'danger', skippable:false });
  }

  // Algizid ab 20°C Wassertemperatur
  const algStep = String(tasks.length + 1);
  if (inp.water !== null && inp.water >= 20) {
    const ml = (inp.air !== null && inp.air >= 28) ? 150 : 100;
    tasks.push({ id:'algizid', step:algStep, icon:'🌿', name:'Algizid zugeben', desc:`Wassertemperatur ${inp.water} °C – wöchentlich Algizid zur Algenprävention.${inp.air >= 28 ? ' Erhöhte Menge wegen Hitze und Sonne.' : ''}`, dose:`${ml} ml Algizid`, doseType:'info', skippable:false });
  } else if (inp.water !== null && inp.water < 20) {
    tasks.push({ id:'algizid', step:algStep, icon:'🌿', name:'Algizid (noch nicht nötig)', desc:`Wassertemperatur ${inp.water} °C – Algizid erst ab 20 °C erforderlich.`, dose:'Noch nicht zugeben', doseType:'muted', skippable:true });
  } else {
    tasks.push({ id:'algizid', step:algStep, icon:'🌿', name:'Algizid', desc:'Wassertemperatur eingeben um zu prüfen ob Algizid nötig ist.', dose:'Temperatur oben eingeben', doseType:'muted', skippable:true });
  }

  return tasks;
}

function refresh() {
  const inp = getInputs();
  state.inputs = inp;
  save();
  const tasks = buildTasks(inp);
  renderAlerts(inp);
  renderTasks(tasks);
  renderProgress(tasks);
}

function renderAlerts(inp) {
  const box = document.getElementById('alertBox');
  box.innerHTML = '';
  if (inp.air !== null && inp.air >= 30)
    box.innerHTML += `<div class="alert alert-warn"><span class="alert-icon">🌡️</span><div><strong>Hitzewarnung:</strong> ${inp.air} °C – Schockchlorung heute notwendig! Chlor wird bis zu 3× schneller verbraucht.</div></div>`;
  if (inp.water !== null && inp.water >= 28)
    box.innerHTML += `<div class="alert alert-info"><span class="alert-icon">🌊</span><div><strong>Warmes Wasser:</strong> ${inp.water} °C – erhöhte Algengefahr. Algizid-Menge auf 150 ml erhöhen.</div></div>`;
  if (inp.cl !== null && inp.cl < 0.5)
    box.innerHTML += `<div class="alert alert-warn"><span class="alert-icon">⚡</span><div><strong>Kritisch:</strong> Chlor nur ${inp.cl} mg/L – sofortige Schockchlorung empfohlen. Heute Abend zugeben.</div></div>`;
  if (inp.ph !== null && (inp.ph > 7.8 || inp.ph < 6.5))
    box.innerHTML += `<div class="alert alert-warn"><span class="alert-icon">⚠️</span><div><strong>pH kritisch:</strong> ${inp.ph} – dringend korrigieren. Bei diesem Wert ist Chlor unwirksam.</div></div>`;
}

function renderTasks(tasks) {
  const list = document.getElementById('taskList');
  list.innerHTML = '';
  tasks.forEach((t, i) => {
    const done = state.tasks[t.id] === 'done';
    const skipped = state.tasks[t.id] === 'skip';
    const div = document.createElement('div');
    div.className = 'task' + (done ? ' done' : skipped ? ' skipped' : '');
    div.style.animationDelay = (i * .06) + 's';
    div.innerHTML = `
      <div class="task-top" onclick="toggleTask('${t.id}')">
        <div class="task-check">${done ? '✓' : skipped ? '–' : ''}</div>
        <div class="task-body">
          <div class="task-name"><span class="step">${t.step}</span>${t.icon} ${t.name}</div>
          <div class="task-desc">${t.desc}</div>
          <span class="task-dose ${t.doseType}">${t.dose}</span>
        </div>
      </div>
      ${t.skippable && !done && !skipped ? `<button class="skip-btn" onclick="skipTask('${t.id}')">Überspringen</button>` : ''}
    `;
    list.appendChild(div);
  });
}

function renderProgress(tasks) {
  const total = tasks.length;
  const done = tasks.filter(t => state.tasks[t.id] === 'done' || state.tasks[t.id] === 'skip').length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressTxt').textContent = `${done} / ${total} erledigt`;
  const allRequired = tasks.filter(t => !t.skippable).every(t => state.tasks[t.id] === 'done' || state.tasks[t.id] === 'skip');
  const cbox = document.getElementById('congratsBox');
  if (allRequired && total > 0) {
    cbox.style.display = 'block';
    const now = new Date();
    state.completedAt = now.toISOString();
    save();
    document.getElementById('doneTime').textContent = 'Abgeschlossen am ' + now.toLocaleDateString('de-CH', { weekday:'long', day:'numeric', month:'long' }) + ' um ' + now.toLocaleTimeString('de-CH', { hour:'2-digit', minute:'2-digit' });
  } else {
    cbox.style.display = 'none';
  }
}

function toggleTask(id) {
  state.tasks[id] = state.tasks[id] === 'done' ? undefined : 'done';
  if (state.tasks[id] === undefined) delete state.tasks[id];
  save(); refresh();
}

function skipTask(id) {
  state.tasks[id] = 'skip';
  save(); refresh();
}

function resetWeek() {
  const box = document.getElementById('resetConfirm');
  box.style.display = box.style.display === 'none' ? 'flex' : 'none';
}

function doReset() {
  state = { tasks: {}, inputs: {}, completedAt: null };
  localStorage.removeItem(STORAGE_KEY);
  ['inPh','inCl','inWater','inAir'].forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('congratsBox').style.display = 'none';
  document.getElementById('lastDoneNote').textContent = '';
  document.getElementById('resetConfirm').style.display = 'none';
  refresh();
}

function initDate() {
  const now = new Date();
  document.getElementById('todayDate').textContent = now.toLocaleDateString('de-CH', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  const startOfYear = new Date(now.getFullYear(), 0, 1);
  const kw = Math.ceil(((now - startOfYear) / 86400000 + startOfYear.getDay() + 1) / 7);
  document.getElementById('weekTag').textContent = 'KW ' + kw;
  if (state.completedAt) {
    const d = new Date(state.completedAt);
    document.getElementById('lastDoneNote').textContent = 'Letzte Routine: ' + d.toLocaleDateString('de-CH', { day:'numeric', month:'short' });
  }
}

function restoreInputs() {
  if (!state.inputs) return;
  const map = { ph:'inPh', cl:'inCl', water:'inWater', air:'inAir' };
  Object.entries(map).forEach(([k, id]) => {
    if (state.inputs[k] != null) document.getElementById(id).value = state.inputs[k];
  });
}

// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

initDate();
restoreInputs();
refresh();
</script>
</body>
</html>
